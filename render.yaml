services:
  - type: web
    name: restaurant-pos
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false       # You fill this in Render dashboard
      - key: JWT_SECRET
        sync: false       # You fill this in Render dashboard
      - key: NODE_ENV
        value: production
